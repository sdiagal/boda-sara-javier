<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boda Sara & Javier</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  padding:40px;
  background:#f5efe7;
}

.container{
  max-width:600px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
  font-size:32px;
}

button{
  padding:12px 20px;
  border:none;
  background:#2f332d;
  color:white;
  border-radius:8px;
  cursor:pointer;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>💍 Sara & Javier</h1>
  <p>31 de Octubre de 2026</p>

  <form id="form">
    <input type="text" id="nombre" placeholder="Tu nombre" required><br><br>
    <input type="email" id="email" placeholder="Tu email" required><br><br>

    <button type="submit">Confirmar asistencia</button>
  </form>

  <p id="mensaje"></p>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxmiS_bkoSrnklW9vHBwKhz4jSqtwwtTX9bkZ2rnSnOJsuvTfTN_-pydTe6VKSAlQev/exec";

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    nombre: document.getElementById("nombre").value,
    email: document.getElementById("email").value,
    asistencia: "Si"
  };

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data),
    headers: {
      "Content-Type": "application/json"
    }
  })
  .then(res => res.json())
  .then(res => {
    document.getElementById("mensaje").innerText = "✅ Confirmado correctamente";
  })
  .catch(err => {
    document.getElementById("mensaje").innerText = "❌ Error al enviar";
  });

});

</script>

</body>
</html>
